- name: Install Kubernetes stack on DigitalOcean VM
  hosts: all
  become: true

  vars:
    minikube_cpus: 2
    minikube_memory: 2048

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - apt-transport-https
          - conntrack
          - socat
          - docker.io
        state: present

    - name: Enable Docker
      systemd:
        name: docker
        state: started
        enabled: true
      when: not ansible_check_mode

    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -LS https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm -f kubectl
      args:
        creates: /usr/local/bin/kubectl
      when: not ansible_check_mode

    - name: Install minikube
      shell: |
        curl -LO https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64
        install minikube-linux-amd64 /usr/local/bin/minikube
        rm -f minikube-linux-amd64
      args:
        creates: /usr/local/bin/minikube
      when: not ansible_check_mode

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
      when: not ansible_check_mode

    - name: Start minikube
      shell: |
        minikube status >/dev/null 2>&1 || \
        minikube start --driver=docker --force --cpus={{ minikube_cpus }} --memory={{ minikube_memory }}
      environment:
        CHANGE_MINIKUBE_NONE_USER: "true"
      when: not ansible_check_mode

    - name: Enable ingress addon
      shell: minikube addons enable ingress
      when: not ansible_check_mode

    - name: Enable dashboard addon
      shell: minikube addons enable dashboard
      when: not ansible_check_mode

    - name: Create kubectl proxy systemd unit
      copy:
        dest: /etc/systemd/system/kubectl-proxy.service
        mode: "0644"
        content: |
          [Unit]
          Description=kubectl proxy
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/kubectl proxy --address=0.0.0.0 --port=8001 --accept-hosts=.*
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      when: not ansible_check_mode

    - name: Start kubectl proxy
      systemd:
        daemon_reload: true
        name: kubectl-proxy
        state: started
        enabled: true
      when: not ansible_check_mode

    - name: Show versions
      shell: |
        docker --version
        kubectl version --client
        minikube version
        helm version
      when: not ansible_check_mode