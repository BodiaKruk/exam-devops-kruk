apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-exam-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-exam
  template:
    metadata:
      labels:
        app: devops-exam
    spec:
      containers:
      - name: devops-exam
        image: <DOCKERHUB_USER>/devops-exam:develop
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: devops-exam-dev
  namespace: dev
spec:
  type: NodePort
  selector:
    app: devops-exam
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30082
