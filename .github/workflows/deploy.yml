name: 'App Deploy CI/CD'
on:
  push:
    branches: [develop]
    paths:
      - 'task03/**'
  tags: ['1.0.0']

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_PASS }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_REF##*/}
          docker build -t $DOCKERHUB_USER/devops-exam:$IMAGE_TAG .

      - name: Login to DockerHub
        run: echo $DOCKERHUB_PASS | docker login -u $DOCKERHUB_USER --password-stdin

      - name: Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_REF##*/}
          docker push $DOCKERHUB_USER/devops-exam:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Copy kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Validate manifests
        run: kubectl apply -f task03/manifests/ --dry-run=client

      - name: Deploy to Kubernetes
        run: kubectl apply -f task03/manifests/
