apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-exam
  namespace: release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-exam
  template:
    metadata:
      labels:
        app: devops-exam
    spec:
      containers:
      - name: devops-exam
        image: ghcr.io/exam-devops-kruk/devops-exam:1.0.0
        ports:
        - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: devops-exam
  namespace: release
spec:
  type: LoadBalancer
  selector:
    app: devops-exam
  ports:
    - port: 8003
      targetPort: 8003
